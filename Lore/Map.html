<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rupture Wiki - Map</title>
    <link rel="stylesheet" href="../style.css">
    <style>
        .map-container {
            margin: 20px auto;
            max-width: 900px;
            padding: 20px;
            position: relative;
            overflow: hidden; /* Pour cacher les bords de l'image lorsqu'elle est déplacée */
        }

        .map-image-container {
            position: relative;
            display: inline-block;
            transition: transform 0.2s ease;
            cursor: grab; /* Curseur pour le déplacement */
        }

        .map-image-container img {
            width: 100%;
            height: auto;
            display: block;
        }

        .map-point {
            position: absolute;
            transform: translate(-50%, -50%);
            cursor: pointer;
            font-weight: bold;
            color: black;
            white-space: nowrap;
            user-select: none;
            transition: all 0.2s ease;
            text-shadow: 0 0 8px rgba(255, 255, 255, 0.5);
            display: none; /* Masquer par défaut */
        }

        .map-point.visible {
            display: block; /* Afficher quand zoomé */
        }

        /* Styles pour le hover des points */
        .map-point:hover {
            text-shadow: 
                -1px -1px 0 white,
                1px -1px 0 white,
                -1px 1px 0 white,
                1px 1px 0 white,
                0 -1px 0 white,
                0 1px 0 white,
                -1px 0 0 white,
                1px 0 0 white;
            font-size: 1.1em;
            filter: drop-shadow(0 0 3px rgba(255, 255, 255, 0.8));
        }

        .map-point a {
            color: inherit;
            text-decoration: none;
        }

        .map-point a:hover {
            color: white;
        }
    </style>
</head>
<body>
    <!-- Navbar injectée -->
    <div id="navbar-container"></div>
    <script src="../navbar.js"></script>

    <div class="header">
        <h1>Rupture JDR</h1>
        <p>Carte du Monde</p>
    </div>

    <div class="map-container">
        <div class="map-image-container" id="mapImageContainer">
            <img src="../img/map.jpg" alt="Carte de Rupture">
            <div id="mapPointsContainer"></div>
        </div>
    </div>

    <script>
    
    // minZoom : zoom minimal pour afficher le point
    //   0   = toujours visible dès le départ
    //   1   = visible au zoom par défaut (1x)
    //   1.5 = visible seulement après avoir zoomé à 1.5x
    //   etc.
    const mapPoints = [
        { name: 'Solhéon',   x: 52, y: 65, link: '../Clans/solheon.html',   minZoom: 0   },
        { name: 'Rivargent', x: 63, y: 45, link: '../Clans/rivargent.html', minZoom: 0   },
        { name: 'L Atre',    x: 38, y: 49, link: '../Clans/atre.html',      minZoom: 0 },
        { name: 'Erivale',   x: 30, y: 28, link: '../Clans/erivale.html',   minZoom: 0 },
        { name: 'Kaer Nor',  x: 70, y: 16, link: '../Clans/kaernor.html',   minZoom: 0   },
        { name: 'Port de la rivière',  x: 71, y: 40, link: '',   minZoom: 2   }
    ];

    let scale = 1;
    const dragSpeed = 30;
   const mapImageContainer = document.getElementById('mapImageContainer');
 
    function initMap() {
        const container = document.getElementById('mapPointsContainer');
        container.innerHTML = '';
 
        mapPoints.forEach(point => {
            const pointElement = point.link
                ? document.createElement('a')
                : document.createElement('span');
 
            if (point.link) {
                pointElement.href = point.link;
                pointElement.title = point.name;
            } else {
                pointElement.style.cursor = 'default';
            }
 
            pointElement.className = 'map-point';
            pointElement.style.left = point.x + '%';
            pointElement.style.top = point.y + '%';
            pointElement.textContent = point.name;
            pointElement.dataset.minZoom = point.minZoom ?? 1.2;
 
            container.appendChild(pointElement);
        });
 
        updatePointsVisibility();
    }
 
    function updatePointsVisibility() {
        const points = document.querySelectorAll('.map-point');
        points.forEach(point => {
            const minZoom = parseFloat(point.dataset.minZoom);
            const visible = scale >= minZoom;
            point.classList.toggle('visible', visible);
            // Compenser le zoom de la map pour garder une taille de texte constante à l'écran
            point.style.fontSize = (1 / scale) + 'em';
        });
    }
 
    // Zoom à la molette
    mapImageContainer.addEventListener('wheel', (event) => {
        event.preventDefault();
        const rect = mapImageContainer.getBoundingClientRect();
        const mouseX = event.clientX - rect.left;
        const mouseY = event.clientY - rect.top;
 
        const scaleChange = event.deltaY > 0 ? -0.1 : 0.1;
        const newScale = Math.min(Math.max(scale + scaleChange, 0.5), 3);
 
        const scaleFactor = newScale / scale;
        const offsetX = mouseX * (1 - scaleFactor);
        const offsetY = mouseY * (1 - scaleFactor);
 
        scale = newScale;
        const currentTransform = getComputedStyle(mapImageContainer).transform;
        const matrix = new DOMMatrix(currentTransform);
        mapImageContainer.style.transform = `matrix(${scale}, 0, 0, ${scale}, ${matrix.e + offsetX}, ${matrix.f + offsetY})`;
 
        updatePointsVisibility();
    });
 
    // Déplacement au clic droit
    let isDragging = false;
    let startX, startY;
 
    mapImageContainer.addEventListener('mousedown', (event) => {
        if (event.button === 2) {
            isDragging = true;
            startX = event.clientX;
            startY = event.clientY;
            mapImageContainer.style.cursor = 'grabbing';
        }
    });
 
    document.addEventListener('mouseup', () => {
        isDragging = false;
        mapImageContainer.style.cursor = 'grab';
    });
 
    document.addEventListener('mousemove', (event) => {
        if (isDragging) {
            const dx = (event.clientX - startX) * dragSpeed;
            const dy = (event.clientY - startY) * dragSpeed;
            const currentTransform = getComputedStyle(mapImageContainer).transform;
            const matrix = new DOMMatrix(currentTransform);
            mapImageContainer.style.transform = `matrix(${scale}, 0, 0, ${scale}, ${matrix.e + dx}, ${matrix.f + dy})`;
            startX = event.clientX;
            startY = event.clientY;
        }
    });
 
    document.addEventListener('contextmenu', (event) => {
        event.preventDefault();
    });
 
    document.addEventListener('DOMContentLoaded', initMap);
    </script>
</body>
</html>
