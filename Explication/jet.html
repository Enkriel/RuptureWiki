<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regles de Rupture</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
<div id="navbar-container"></div>
<script src="../navbar.js"></script>

<div class="clan-wrapper">
   
    <div class="clan-header">
        <h1>Regle en 20min Vidéo</h1>
        <p style="font-size: 1.1rem; opacity: 0.9; margin-top: 10px;">Un JDR flexible et modulable</p>
    </div>

    <section class="clan-section">
        <h2>📺 Faire un jet</h2>
        <div style="display: flex; justify-content: center; margin: 30px 0;">
            <iframe 
                width="100%" 
                max-width="800px"
                height="450" 
                src="https://www.youtube.com/embed/9ZdmVt66oQU" 
                title="Jet dans Rupture" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen
                style="border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
            </iframe>
        </div>
    </section>

    <section class="clan-section">
        <h2>📺 Systeme de combat et cercle d'Affrontement</h2>
        <div style="display: flex; justify-content: center; margin: 30px 0;">
            <iframe 
                width="100%" 
                max-width="800px"
                height="450" 
                src="https://www.youtube.com/embed/U30zQNnGcvw" 
                title="Jet dans Rupture" 
                frameborder="0" 
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" 
                allowfullscreen
                style="border-radius: 15px; box-shadow: 0 8px 32px rgba(0,0,0,0.2);">
            </iframe>
        </div>
    </section>


    </section>
